# ------------------------------------------------------------------
# -------- Documentation tests (doctests) in markdown files --------
# ------------------------------------------------------------------

[[tests]]
files = ["doc/**/*.md", "*.md"]
markdown.languages_to_test_as_jou = ["python"]
skip = {no_expected_output = "silent", default = {--valgrind = true, default = false}}


# ------------------------------------
# -------- examples directory --------
# ------------------------------------

[[tests]]
files = "examples/*.jou"

[[tests]]
files = "examples/aoc*/day*/part*.jou"
cd_to_containing_directory = true  # needed for open("sampleinput.txt", "r")

# BIG QUESTION: should configuration be merged or should it take the last one?
# I think merge.
[[tests]]
files = "examples/memory_leak.jou"
skip = true  # This program doesn't interact nicely with automated tests at all.


# ---------------------------------
# -------- tests directory --------
# ---------------------------------

[[tests]]
files = [
    "tests/should_succeed/*.jou",
    "tests/should_succeed/double_dotdot_import/*/*.jou",
]

# This test links with LLVM, and somehow just linking with LLVM leaks memory
# when the program starts, even if it is never called.
[[tests]]
files = "tests/should_succeed/compiler_unit_tests.jou"
skip = {--valgrind = true, default = false}

[[tests]]
files = [
    "tests/404/*.jou",
    "tests/already_exists_error/*.jou",
    "tests/other_errors/*.jou",
    "tests/syntax_error/*.jou",
    "tests/too_long/*.jou",
    "tests/wrong_place/*.jou",
    "tests/wrong_type/*.jou",
]
skip = {--valgrind = true, default = false}
expected_exit_code = 1

# Crashing tests are a bit special. They should fail, and output varies by platform.
[[tests]]
files = "tests/crash/*.jou"
skip = {-O0 = false, default = true}
stdout = "discard"
stderr = "discard"
expected_exit_code = 1


# ----------------------------------------------------
# -------- availability of libraries handling --------
# ----------------------------------------------------

[library_availability.liblzma_dynamic]
# Test if pkg-config knows where liblzma dynamically linked library is, or if
# it's directly in /usr/lib. In either case the linker will find it.
windows = false
default = {run = """( pkg-config --exists liblzma || (set -- /usr/lib/liblzma.so* && [ -f "$1" ]) ) > /dev/null"""}

[library_availability.liblzma_static]
windows = false
default = {run = "[ -f `pkg-config --variable=libdir liblzma 2>/dev/null`/liblzma.a ]"}

[library_availability.liblzma_copied]
# If liblzma.a exists, we also copy it to temporary folder.
# If it doesn't exist, the copying fails and that tells the test runner to skip.
windows = false
default = {run = """
mkdir -p tmp/tests
libdir="`pkg-config --variable=libdir liblzma 2>/dev/null || echo /usr/lib`"
cp "$libdir/liblzma.a" tmp/tests/
"""}


