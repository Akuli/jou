############################
# Test joutest with itself #
############################
[[tests]]
files = "tests/tests_of_joutest/**/joutest.toml"
command = ["joutest", "--no-colors"]
cd_to_containing_directory = true
output_comment_rules = {
    Output = '{comment}',
    Error = 'joutest error in file "{file}", line {line}: {comment}'
}

[[tests]]
files = "tests/tests_of_joutest/**/*verbose*/joutest.toml"
command = ["joutest", "--no-colors", "--verbose"]

[[tests]]
files = [
    "tests/tests_of_joutest/bad_configs/**/joutest.toml",
    "tests/tests_of_joutest/test_failures/**/joutest.toml",
]
expected_exit_code = 1

[[tests]]
files = "tests/tests_of_joutest/bad_configs/command_not_found/joutest.toml"
command = {
    windows = ['cmd', '/c', '..\..\..\..\joutest --no-colors | ..\..\..\..\jou windows_output_hack.jou'],
    default = ['joutest', '--no-colors'],
}

###############################
# Test code in markdown files #
###############################
[[tests]]
files = [
    "doc/bitwise.md",
    "doc/enums.md",
    "doc/inline.md",
    "doc/joutest.md",
    "doc/json-parsing.md",
    "doc/loops.md",
]
markdown_code_block_languages = ["python"]
