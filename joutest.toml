############################
# Test joutest with itself #
############################
[[tests]]
files = "tests/tests_of_joutest/**/joutest.toml"
command = ["joutest", "--no-colors"]
cd_to_containing_directory = true
output_comment_rules = {
    Output = '{comment}',
    Error = 'joutest error in file "{file}", line {line}: {comment}'
}

[[tests]]
files = "tests/tests_of_joutest/**/*verbose*/joutest.toml"
command = ["joutest", "--no-colors", "--verbose"]

[[tests]]
files = [
    "tests/tests_of_joutest/bad_configs/**/joutest.toml",
    "tests/tests_of_joutest/test_failures/**/joutest.toml",
]
expected_exit_code = 1

[[tests]]
files = "tests/tests_of_joutest/bad_configs/command_not_found/joutest.toml"
command = {
    windows = ['cmd', '/c', '..\..\..\..\joutest --no-colors | ..\..\..\..\jou windows_output_hack.jou'],
    default = ['joutest', '--no-colors'],
}

###############################
# Test code in markdown files #
###############################
[[tests]]
files = ["README.md", "doc/**/*.md"]
markdown_code_block_languages = ["python"]
output_comment_rules = {
    'Output' = '{comment}',
    'Warning' = 'compiler warning for file "{file}", line {line}: {comment}',
    'Error' = 'compiler error in file "{file}", line {line}: {comment}',
}
skip_mode_if_no_expected_output = "skip_silently"

[[tests]]
files = "doc/assert.md"
# Change the file name shown in error messages
command = ["jou", "--stdin-name", "test.jou", "-"]
# TODO: This setting doesn't exist. Ideally joutest would show line numbers
#       relative to the code block in markdown file, not the whole markdown file.
#       Usually the joutest default is good, but not for showing assertion errors.
#add_newlines_to_fix_markdown_line_number = false
skip_mode = "skip_normally"

# Ignore exit codes for code in markdown that intentionally fails to compile or run
#
# TODO: add a better way to do this.... Ideally "# Error:" anywhere would mean
#       exit code 1, but I'm not sure what the appropriate joutest feature to
#       support that would be. So we ignore the exit codes for now.
[[tests]]
files = [
    "doc/compiler_internals/type-checking.md",
    "doc/keywords.md",
    "doc/match.md",
    "doc/tutorial.md",
    "doc/types.md",
]
command = {
    # Apparently ver>nul is the Windows cmd equivalent of "true".
    # https://stackoverflow.com/a/47318952
    windows = ["cmd", "/c", 'jou --stdin-name "{file}" - || ver>nul'],
    default = ["sh", "-c", "jou --stdin-name '{file}' - || true"],
}
